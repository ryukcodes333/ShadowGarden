<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#110d28"/>
      <stop offset="100%" stop-color="#06060f"/>
    </radialGradient>
    <radialGradient id="moon" cx="35%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="55%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#4c1d95"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <circle cx="32" cy="32" r="32" fill="url(#bg)"/>
  <circle cx="32" cy="32" r="23" fill="url(#moon)"/>
  <circle cx="41" cy="27" r="17" fill="#06060f"/>
  <circle cx="14" cy="16" r="1.8" fill="#fbbf24" opacity="0.9" filter="url(#glow)"/>
  <circle cx="52" cy="11" r="1.2" fill="#06b6d4" opacity="0.85" filter="url(#glow)"/>
  <circle cx="8"  cy="36" r="1"   fill="#a78bfa" opacity="0.7"/>
  <circle cx="55" cy="42" r="0.9" fill="#f472b6" opacity="0.6"/>
  <circle cx="20" cy="52" r="0.8" fill="#38bdf8" opacity="0.5"/>
</svg>
